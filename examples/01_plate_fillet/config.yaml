stock:
  x: 100.0
  y: 100.0
  z: 20.0
  material: "Aluminum 6061"

target:
  x: 60.0
  y: 60.0
  z: 15.0
  fillet_radius: 3.0

tools:
  - name: "10mm Flat Endmill"
    type: flat_endmill
    diameter: 10.0
    flute_length: 30.0
    flutes: 3
    tool_number: 1
  - name: "6mm Ball Endmill"
    type: ball_endmill
    diameter: 6.0
    flute_length: 20.0
    flutes: 2
    tool_number: 2

cutting:
  spindle_rpm: 8000
  feed_rate: 500.0
  plunge_rate: 200.0
  depth_per_pass: 2.0
  stepover_ratio: 0.4

postprocessor: fanuc

output:
  step: output/step/plate_fillet.step
  gcode: output/gcode/plate_fillet.nc
  image: output/images/plate_fillet.png
